<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT SLOT // CYBER ROUlette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="wheel.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scanlines"></div>
    <div class="cyber-bg"></div>
    
    <div class="container">
        <div class="header">
            <h1 id="greeting" class="glitch" data-text="LUCKY SPIN">LUCKY SPIN</h1>
            <div class="status-bar">
                <div class="balance">
                    <span class="label">BALANCE</span>
                    <span class="value" id="userName"></span>
                </div>
                <div class="multiplier">
                    <span class="label">x2 EVENT</span>
                    <span class="value">ACTIVE</span>
                </div>
            </div>
        </div>
        
        <!-- Горизонтальная рулетка в стиле GorilaCase -->
        <div class="slot-machine">
            <div class="slot-header">
                <div class="slot-title">🎰 MAIN ROUlette</div>
                <div class="slot-subtitle">5x MULTI SPIN</div>
            </div>
            
            <div class="window-container">
                <div class="window-glow"></div>
                <div class="window">
                    <div class="reel" id="reel">
                        <!-- Сюда будут добавляться призы -->
                    </div>
                </div>
                <div class="pointer-line">
                    <span>▼</span>
                    <div class="pointer-glow"></div>
                </div>
            </div>
            
            <div class="controls">
                <button onclick="spinSlot()" id="spinBtn" class="cyber-button">
                    <span class="glitch-text">[ SPIN ]</span>
                    <span class="button-glow"></span>
                </button>
            </div>
        </div>
        
        <!-- Статистика призов в стиле GorilaCase -->
        <div class="prize-panel">
            <div class="panel-header">
                <span class="panel-title">▶ DROP RATES ◀</span>
            </div>
            <div class="prize-grid">
                <div class="prize-card rare">
                    <div class="card-glow"></div>
                    <div class="prize-emoji">0️⃣</div>
                    <div class="prize-info">
                        <span class="prize-name">VOID</span>
                        <span class="prize-chance">30%</span>
                    </div>
                </div>
                <div class="prize-card common">
                    <div class="card-glow"></div>
                    <div class="prize-emoji">⭐</div>
                    <div class="prize-info">
                        <span class="prize-name">1 STAR</span>
                        <span class="prize-chance">30%</span>
                    </div>
                </div>
                <div class="prize-card rare">
                    <div class="card-glow"></div>
                    <div class="prize-emoji">🔟⭐</div>
                    <div class="prize-info">
                        <span class="prize-name">10 STARS</span>
                        <span class="prize-chance">20%</span>
                    </div>
                </div>
                <div class="prize-card epic">
                    <div class="card-glow"></div>
                    <div class="prize-emoji">🎁</div>
                    <div class="prize-info">
                        <span class="prize-name">GIFT</span>
                        <span class="prize-chance">10%</span>
                    </div>
                </div>
                <div class="prize-card legendary">
                    <div class="card-glow"></div>
                    <div class="prize-emoji">🐸</div>
                    <div class="prize-info">
                        <span class="prize-name">PEPE</span>
                        <span class="prize-chance">10%</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Навигация -->
        <div class="nav-bar">
            <button onclick="goBack()" class="nav-btn">
                <span class="nav-icon">◀</span>
                <span class="nav-text">BACK</span>
            </button>
            <div class="nav-divider"></div>
            <button onclick="showInfo()" class="nav-btn">
                <span class="nav-text">INFO</span>
                <span class="nav-icon">▶</span>
            </button>
        </div>
    </div>
    
    <!-- Модальное окно победы в стиле GorilaCase -->
    <div id="winModal" class="modal" style="display: none;">
        <div class="modal-overlay"></div>
        <div class="modal-content cyber-modal">
            <div class="modal-glow"></div>
            <div class="modal-header">
                <span class="modal-title">🎉 VICTORY 🎉</span>
                <span class="close" onclick="closeModal()">✕</span>
            </div>
            <div class="modal-body">
                <div id="prizeDisplay" class="prize-display"></div>
                <h2 id="winMessage" class="win-message glitch" data-text="КРАСАВЧИК БРАТ">КРАСАВЧИК БРАТ</h2>
                <div class="win-stats">
                    <div class="win-stat">
                        <span class="stat-label">MULTIPLIER</span>
                        <span class="stat-value">x1</span>
                    </div>
                    <div class="win-stat">
                        <span class="stat-label">BONUS</span>
                        <span class="stat-value">+0</span>
                    </div>
                </div>
            </div>
            <button onclick="closeModal()" class="modal-btn">[ COLLECT ]</button>
        </div>
    </div>
    
    <script src="wheel.js"></script>
</body>
</html>
